services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./api:/app/api
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
    environment:
      - VITE_SIGNALING_URL=ws://signaling:4444
    depends_on:
      - signaling
    networks:
      - cd-wishlist

  signaling:
    build:
      context: .
      dockerfile: Dockerfile.signaling
    ports:
      - "4444:4444"
    environment:
      - PORT=4444
    networks:
      - cd-wishlist

  # Playwright MCP Browser 1 - for automated browser testing
  # See AGENTS.md for MCP usage documentation
  # Access: http://localhost:3000 (maps to container port 8931)
  # --allowed-hosts '*' required to accept connections from outside localhost
  playwright:
    image: mcr.microsoft.com/playwright/mcp
    entrypoint: node
    command: ["/app/cli.js", "--headless", "--browser", "chromium", "--no-sandbox", "--port", "8931", "--host", "0.0.0.0", "--allowed-hosts", "*"]
    depends_on:
      - frontend
      - signaling
    ports:
      - "3000:8931"
    networks:
      - cd-wishlist

  # Playwright MCP Browser 2 - second browser for WebRTC sync testing
  # Both browsers needed to test peer-to-peer synchronization
  # Access: http://localhost:3001 (maps to container port 8931)
  playwright-browser2:
    image: mcr.microsoft.com/playwright/mcp
    entrypoint: node
    command: ["/app/cli.js", "--headless", "--browser", "chromium", "--no-sandbox", "--port", "8931", "--host", "0.0.0.0", "--allowed-hosts", "*"]
    depends_on:
      - frontend
      - signaling
    ports:
      - "3001:8931"
    networks:
      - cd-wishlist

networks:
  cd-wishlist:
    driver: bridge